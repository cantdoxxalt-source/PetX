[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build && cd backend && npm install && npm run db:generate && npm run build"

[deploy]
startCommand = "cd backend && npm run db:migrate && node ../backend/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
